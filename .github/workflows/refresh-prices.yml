name: Refresh market prices

# Pulls current Lost Ark market prices into index.html's baked snapshot every 6
# hours and commits the change, which re-deploys Pages with fresh prices.
# refresh_prices.py only rewrites the file when prices actually changed, so this
# commits only on real movement (not every run).

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch: {}       # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write             # lets the default token push the refreshed snapshot

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh prices into index.html
        run: python3 refresh_prices.py
      - name: Commit & push if prices changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No price change — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Auto-refresh market prices"
            git push
            echo "Pushed refreshed prices."
          fi
